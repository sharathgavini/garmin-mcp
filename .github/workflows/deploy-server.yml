name: Deploy MCP Server

on:
  # Manual deploy is useful after validating local/GCS flows.
  workflow_dispatch:
  # Server-only changes deploy automatically from main.
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Prefer Workload Identity Federation when configured.
      - name: Authenticate to Google Cloud with WIF
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      # Service account JSON remains as a simple v1 fallback.
      - name: Authenticate to Google Cloud with service account key
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER == ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY }}
          IMAGE: garmin-mcp-server
        run: |
          docker build -t "$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }}" server
          docker push "$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }}"

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY }}
          IMAGE: garmin-mcp-server
          SERVICE: garmin-mcp
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }}" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --set-env-vars "GCS_BUCKET=$GCS_BUCKET,NODE_ENV=production" \
            --set-secrets "MCP_BEARER_TOKEN=MCP_BEARER_TOKEN:latest"
