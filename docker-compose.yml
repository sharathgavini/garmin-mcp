# Self-hosted TrueNAS compose file.
#
# Bind mounts point at persistent host directories so Garmin JSON and encrypted
# session/OAuth state survive container rebuilds.
services:
  garmin-mcp:
    container_name: garmin-mcp
    build:
      context: .
      dockerfile: Dockerfile.selfhost
    restart: unless-stopped
    env_file:
      - path: .env.selfhost
        required: false
    environment:
      # MCP reads latest data by default; archive is a sibling under /app/data/archive.
      TZ: Asia/Kolkata
      PORT: "3000"
      GARMIN_DATA_MODE: local
      GARMIN_DATA_DIR: ${GARMIN_DATA_DIR:-/app/data/latest}
      GARMIN_SESSION_FILE: /app/secrets/.garmin-session.enc
      OAUTH_ISSUER: ${OAUTH_ISSUER:-https://garmin.sharathgavini.com}
      OAUTH_SECRETS_DIR: /app/secrets
      OAUTH_TOKEN_TTL_SECONDS: ${OAUTH_TOKEN_TTL_SECONDS:-2592000}
      SYNC_DAYS: "30"
      RUN_INITIAL_SYNC: "false"
    volumes:
      # HOST_* defaults match the intended TrueNAS pool layout but can be overridden in .env.selfhost.
      - ${HOST_DATA_DIR:-/mnt/scg_pool_1/apps/garmin-mcp/data}:/app/data
      - ${HOST_SECRETS_DIR:-/mnt/scg_pool_1/apps/garmin-mcp/secrets}:/app/secrets
    ports:
      - "3000:3000"
